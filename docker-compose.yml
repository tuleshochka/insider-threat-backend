services:
  postgres:
    image: postgres:16
    container_name: ueba_db
    environment:
      POSTGRES_DB: ueba
      POSTGRES_USER: ueba
      POSTGRES_PASSWORD: ueba_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ueba -d ueba"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: ueba_api
    ports:
      - "8000:8000"
    environment:
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ueba
      - DB_PASSWORD=ueba_pass
      - DB_NAME=ueba
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: ueba_celery_worker
    environment:
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ueba
      - DB_PASSWORD=ueba_pass
      - DB_NAME=ueba
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.core.celery_app worker --loglevel=info

volumes:
  pgdata:
